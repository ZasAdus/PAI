version: '3.8'
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: gtp
      POSTGRES_PASSWORD: gtp
      POSTGRES_DB: gtp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gtp"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/seeds/seed_data.sql:/docker-entrypoint-initdb.d/seed_data.sql:ro
      - ./backend/seeds/player_profiles.csv:/docker-entrypoint-initdb.d/player_profiles.csv:ro
      - ./backend/seeds/team_competitions_seasons.csv:/docker-entrypoint-initdb.d/team_competitions_seasons.csv:ro
      - ./backend/seeds/team_details.csv:/docker-entrypoint-initdb.d/team_details.csv:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./backend/.env
    restart: always
    environment:
      DATABASE_URL: postgres://gtp:gtp@db:5432/gtp
      REDIS_URL: redis://redis:6379/0
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "echo 'Starting backend...' &&
             sleep 3 &&
             until alembic upgrade head; do 
               echo 'Migration failed, retrying in 3s...'; 
               sleep 3; 
             done &&
             echo 'Migrations complete, starting uvicorn...' &&
             exec uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"

volumes:
  db_data:
